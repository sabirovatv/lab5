name: Build and Test
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y lcov
    - name: Configure and build with coverage
      run: |
        cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DCODE_COVERAGE=ON
        cmake --build build
    - name: Run tests
      run: |
        cd build
        ctest --output-on-failure
    - name: Generate coverage report
      run: |
        lcov --capture --directory build --output-file coverage.info --ignore-errors mismatch,gcov,unused
        lcov --remove coverage.info \
          '/usr/*' \
          '*/build/_deps/*' \
          '*/_deps/*' \
          '*/googletest*' \
          '*/gtest*' \
          --ignore-errors mismatch,gcov,unused \
          --output-file coverage.cleaned.info
        lcov --extract coverage.cleaned.info \
          '*/banking/*.cpp' \
          --ignore-errors mismatch,gcov,unused \
          --output-file coverage.final.info
        lcov --list coverage.final.info
    - name: Upload coverage to Coveralls
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        path-to-lcov: coverage.final.info
